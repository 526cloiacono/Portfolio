<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seton Hall Baseball Stadium</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#0d1a2e;
  font-family:Arial,Helvetica,sans-serif;
}

#hero-field-wrap{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

canvas{
  display:block;
}

.overlay{
  position:absolute;
  inset:0;
  z-index:5;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  pointer-events:none;
  text-align:center;
}

.overlay h1{
  font-size:clamp(4rem,10vw,9rem);
  line-height:.9;
  letter-spacing:.08em;
  color:#fff;
  text-shadow:0 0 25px rgba(255,255,255,.25);
}

.overlay h1 span{
  color:#C8972B;
}

.overlay p{
  margin-top:18px;
  color:#d8d8d8;
  letter-spacing:.25em;
  font-size:1rem;
}

/* Base arrival modal */
#base-modal-overlay{
  position:fixed;
  inset:0;
  z-index:50;
  background:rgba(0,0,0,.72);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .35s;
}
#base-modal-overlay.visible{
  opacity:1;
  pointer-events:all;
}
#base-modal{
  background:linear-gradient(160deg,#00205B 0%,#0a1535 100%);
  border:2px solid #C8972B;
  border-radius:12px;
  padding:36px 44px;
  text-align:center;
  max-width:380px;
  width:90%;
  box-shadow:0 0 60px rgba(200,151,43,.35);
  transform:translateY(24px);
  transition:transform .35s;
}
#base-modal-overlay.visible #base-modal{
  transform:translateY(0);
}
#base-modal .modal-base-label{
  color:#C8972B;
  font-size:.75rem;
  letter-spacing:.25em;
  text-transform:uppercase;
  margin-bottom:6px;
}
#base-modal h2{
  color:#fff;
  font-size:1.75rem;
  letter-spacing:.06em;
  margin-bottom:10px;
}
#base-modal p{
  color:#b0bdd8;
  font-size:.9rem;
  letter-spacing:.1em;
  margin-bottom:28px;
}
#base-modal-advance{
  display:inline-block;
  background:#C8972B;
  color:#00205B;
  font-weight:700;
  font-size:.85rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:12px 30px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:background .2s,transform .1s;
}
#base-modal-advance:hover{
  background:#e0ab35;
  transform:scale(1.04);
}

/* Run Again button (home plate) */
#home-advance-btn{
  display:inline-block;
  background:#C8972B;
  color:#00205B;
  font-weight:700;
  font-size:.85rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:12px 30px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:background .2s,transform .1s;
  margin-top:8px;
}
#home-advance-btn:hover{ background:#e0ab35; transform:scale(1.04); }

/* ── Swing panel (fixed side widget) ─────────────────── */
#swing-panel{
  position:fixed;
  right:28px;
  bottom:420px;
  transform:translateX(120%);
  z-index:60;
  background:linear-gradient(160deg,#00205B 0%,#0a1535 100%);
  border:2px solid #C8972B;
  border-radius:12px;
  padding:26px 30px;
  width:290px;
  text-align:center;
  box-shadow:0 0 50px rgba(200,151,43,.4);
  transition:transform .4s cubic-bezier(.22,1,.36,1), opacity .4s;
  opacity:0;
  pointer-events:none;
}
#swing-panel.visible{
  transform:translateX(0);
  opacity:1;
  pointer-events:all;
}
#swing-panel .sp-label{
  color:#C8972B;
  font-size:.85rem;
  letter-spacing:.25em;
  text-transform:uppercase;
  margin-bottom:16px;
}
#swing-trigger-btn{
  display:inline-block;
  background:#C8972B;
  color:#00205B;
  font-weight:700;
  font-size:1.05rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:15px 28px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  width:100%;
  transition:background .2s,transform .1s;
}
#swing-trigger-btn:hover{ background:#e0ab35; transform:scale(1.03); }
#swing-meter-wrap{ display:none; margin-top:14px; }
#swing-panel.meter-active{
  width:520px;
  padding:30px 36px;
}
#swing-instructions{
  font-size:.78rem;
  color:#aac4ff;
  margin-bottom:12px;
  line-height:1.5;
  text-align:center;
}
#swing-instructions strong{ color:#C8972B; }
#swing-meter-track{
  position:relative;
  display:flex;
  height:48px;
  border-radius:6px;
  overflow:hidden;
  margin-bottom:10px;
  border:1px solid rgba(200,151,43,.4);
}
.sm-zone{ height:100%; }
.sm-foul   { flex:10; background:#3a1515; }
.sm-single { flex:12; background:#1a3a1a; }
.sm-double { flex:10; background:#1a2e4a; }
.sm-triple { flex:8;  background:#2a1a4a; }
.sm-homer  { flex:8;  background:#5a3800; }
#swing-cursor{
  position:absolute;
  top:0; bottom:0;
  width:5px;
  background:#fff;
  box-shadow:0 0 10px #fff;
  border-radius:2px;
  left:0;
}
#swing-zone-label{
  font-size:.6rem;
  letter-spacing:.15em;
  color:#7a8fb0;
  margin-bottom:8px;
}
#swing-result-badge{
  font-size:1.5rem;
  font-weight:700;
  letter-spacing:.08em;
  min-height:2rem;
  margin-bottom:8px;
  color:#C8972B;
  text-shadow:0 0 18px rgba(200,151,43,.7);
}
#swing-stop-btn{
  display:none;
  background:#fff;
  color:#00205B;
  font-weight:700;
  font-size:.85rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:11px 0;
  border:none;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  transition:background .2s;
}
#swing-stop-btn:hover{ background:#e0ab35; }

/* Run button in swing panel */
.sp-or{
  color:#5a6e90;
  font-size:.65rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  margin:10px 0 8px;
}
#run-trigger-btn{
  display:inline-block;
  background:transparent;
  color:#C8972B;
  font-weight:700;
  font-size:1.05rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:14px 28px;
  border:2px solid #C8972B;
  border-radius:8px;
  cursor:pointer;
  width:100%;
  transition:background .2s,color .2s,transform .1s;
}
#run-trigger-btn:hover{
  background:rgba(200,151,43,.15);
  transform:scale(1.03);
}

/* Base action buttons (run next / go home) */
#base-actions{
  display:none;
  margin-bottom:6px;
}
#base-run-next-btn, #base-go-home-btn{
  display:block;
  width:100%;
  font-weight:700;
  font-size:.85rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:12px 0;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:background .2s,transform .1s;
}
#base-run-next-btn{
  background:#C8972B;
  color:#00205B;
  margin-bottom:10px;
}
#base-run-next-btn:hover{ background:#e0ab35; transform:scale(1.03); }
#base-go-home-btn{
  background:transparent;
  color:#C8972B;
  border:2px solid #C8972B;
}
#base-go-home-btn:hover{ background:rgba(200,151,43,.12); }
#base-modal-view{
  display:block;
  margin-top:14px;
  color:#C8972B;
  font-size:.8rem;
  letter-spacing:.15em;
  text-transform:uppercase;
  text-decoration:underline;
  opacity:.8;
  transition:opacity .2s, letter-spacing .2s, color .2s;
}
#base-modal-view:hover{
  opacity:1;
  color:#e0ab35;
  letter-spacing:.22em;
}

#base-tooltip{
  position:absolute;
  pointer-events:none;
  z-index:10;
  background:rgba(5,7,13,.9);
  color:#fff;
  padding:10px 18px;
  border-radius:6px;
  font-size:.78rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  border:1px solid rgba(200,151,43,.7);
  opacity:0;
  transition:opacity .2s;
  text-align:center;
  line-height:1.6;
}
#base-tooltip .tip-label{
  color:#C8972B;
  font-size:.7rem;
  display:block;
  margin-top:2px;
}
</style>
</head>

<body>

<div id="base-modal-overlay">
  <div id="base-modal">
    <div class="modal-base-label" id="modal-base-label">First Base</div>
    <h2 id="modal-title">Sophomore Year</h2>
    <p id="modal-desc">Step up to the plate — use the swing meter to advance!</p>
    <!-- At 1st/2nd/3rd: run forward or retreat home -->
    <div id="base-actions">
      <button id="base-run-next-btn">Run to Next Base</button>
      <button id="base-go-home-btn">Go Back to Home Plate</button>
    </div>
    <!-- After scoring -->
    <div id="home-section" style="display:none">
      <button id="home-advance-btn">Run the Bases Again</button>
    </div>
    <a id="base-modal-view" href="#" target="_blank">View Portfolio Page</a>
  </div>
</div>

<!-- Swing panel — fixed to the right side -->
<div id="swing-panel">
  <div class="sp-label">⚾ Batter Up!</div>
  <button id="swing-trigger-btn">SWING</button>
  <div class="sp-or">— or —</div>
  <button id="run-trigger-btn">RUN</button>
  <div id="swing-meter-wrap">
    <div id="swing-instructions">Watch the cursor bounce — click <strong>STOP</strong> when it lands in the colored zone!</div>
    <div id="swing-meter-track">
      <div class="sm-zone sm-foul"></div>
      <div class="sm-zone sm-single"></div>
      <div class="sm-zone sm-double"></div>
      <div class="sm-zone sm-triple"></div>
      <div class="sm-zone sm-homer"></div>
      <div class="sm-zone sm-triple"></div>
      <div class="sm-zone sm-double"></div>
      <div class="sm-zone sm-single"></div>
      <div class="sm-zone sm-foul"></div>
      <div id="swing-cursor"></div>
    </div>
    <div id="swing-zone-label"><span style="color:#3a1515">●</span> FOUL &nbsp;<span style="color:#1a3a1a">●</span> SINGLE &nbsp;<span style="color:#1a2e4a">●</span> DOUBLE &nbsp;<span style="color:#2a1a4a">●</span> TRIPLE &nbsp;<span style="color:#C8972B">●</span> HR</div>
    <div id="swing-result-badge"></div>
    <button id="swing-stop-btn">STOP</button>
  </div>
</div>

<div id="hero-field-wrap">
  <div id="base-tooltip"><span class="tip-name"></span><span class="tip-label">click to open</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
(() => {

  // =====================================================
  // SETUP
  // =====================================================

  const wrap = document.getElementById('hero-field-wrap');

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0d1a2e,0.03);

  const camera = new THREE.PerspectiveCamera(
    55,
    window.innerWidth/window.innerHeight,
    0.1,
    300
  );

  camera.position.set(0,12,24);
  camera.lookAt(0,1,-8);

  const renderer = new THREE.WebGLRenderer({
    antialias:true,
    alpha:true
  });

  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  wrap.appendChild(renderer.domElement);

  window.addEventListener('resize',()=>{

    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(
      window.innerWidth,
      window.innerHeight
    );
  });

  // =====================================================
  // LIGHTING
  // =====================================================

  scene.add(new THREE.AmbientLight(0xffffff, 1.8));

  // Bright midday sun
  const sunLight = new THREE.DirectionalLight(0xfff8e7, 2.5);
  sunLight.position.set(8, 40, 10);
  sunLight.castShadow = true;
  scene.add(sunLight);

  const stadiumLight1 = new THREE.SpotLight(
    0xfff4d6,
    12.0,
    220,
    Math.PI/4,
    .4
  );

  stadiumLight1.position.set(-20,30,10);
  stadiumLight1.castShadow = true;
  scene.add(stadiumLight1);

  const stadiumLight2 = new THREE.SpotLight(
    0xdbeaff,
    11.0,
    220,
    Math.PI/4,
    .4
  );

  stadiumLight2.position.set(20,28,10);
  stadiumLight2.castShadow = true;
  scene.add(stadiumLight2);

  // Extra fill light from center field
  const fillLight = new THREE.DirectionalLight(0xfff8f0, 1.2);
  fillLight.position.set(0, 20, -15);
  scene.add(fillLight);

  // Outfield brightening light
  const outfieldLight = new THREE.DirectionalLight(0xd0e8ff, 3.5);
  outfieldLight.position.set(0, 30, -40);
  outfieldLight.target.position.set(0, 0, -15);
  scene.add(outfieldLight);
  scene.add(outfieldLight.target);

  // Dead center spotlight — floods center field and back of stands
  const centerLight1 = new THREE.SpotLight(0xffffff, 8.0, 180, Math.PI / 3.5, 0.5);
  centerLight1.position.set(0, 45, -5);
  centerLight1.target.position.set(0, 0, -25);
  scene.add(centerLight1);
  scene.add(centerLight1.target);

  const centerLight2 = new THREE.PointLight(0xfff5e0, 5.0, 120);
  centerLight2.position.set(0, 20, -30);
  scene.add(centerLight2);

  // Outside-stadium sun guns aimed at center field from behind and above the bowl
  const extLight1 = new THREE.SpotLight(0xfff8e0, 10.0, 600, Math.PI / 5, 0.4);
  extLight1.position.set(0, 400, -90);
  extLight1.target.position.set(0, 5, -20);
  scene.add(extLight1);
  scene.add(extLight1.target);

  // Flanking lights from left and right outside the stadium
  const extLight2 = new THREE.SpotLight(0xffffff, 8.0, 550, Math.PI / 5, 0.5);
  extLight2.position.set(-80, 350, -50);
  extLight2.target.position.set(0, 5, -20);
  scene.add(extLight2);
  scene.add(extLight2.target);

  const extLight3 = new THREE.SpotLight(0xffffff, 8.0, 550, Math.PI / 5, 0.5);
  extLight3.position.set(80, 350, -50);
  extLight3.target.position.set(0, 5, -20);
  scene.add(extLight3);
  scene.add(extLight3.target);

  const goldLight = new THREE.PointLight(
    0xC8972B,
    8.0,
    60
  );

  goldLight.position.set(0,6,6);
  scene.add(goldLight);

  // Home plate bright spotlight from above
  const homePlateSpot = new THREE.SpotLight(0xffffff, 8.0, 80, Math.PI / 6, 0.3);
  homePlateSpot.position.set(0, 30, 14);
  homePlateSpot.target.position.set(0, 0, 9);
  scene.add(homePlateSpot);
  scene.add(homePlateSpot.target);

  // Point light right at plate level for extra fill
  const homePlateFill = new THREE.PointLight(0xfff8e0, 4.0, 40);
  homePlateFill.position.set(0, 8, 9);
  scene.add(homePlateFill);

  // Center field bleacher lights — two spots aimed directly at middle of the bowl
  const bleacherSpot1 = new THREE.SpotLight(0xfff8e0, 18.0, 120, Math.PI / 5, 0.6);
  bleacherSpot1.position.set(0, 50, 10);
  bleacherSpot1.target.position.set(0, 12, -42);
  scene.add(bleacherSpot1);
  scene.add(bleacherSpot1.target);

  const bleacherSpot2 = new THREE.SpotLight(0xffffff, 14.0, 100, Math.PI / 5, 0.6);
  bleacherSpot2.position.set(0, 35, -10);
  bleacherSpot2.target.position.set(0, 14, -42);
  scene.add(bleacherSpot2);
  scene.add(bleacherSpot2.target);

  // =====================================================
  // SKY
  // =====================================================

  const skyGeo = new THREE.CylinderGeometry(
    50,
    50,
    40,
    64,
    1,
    true
  );

  const skyMat = new THREE.MeshBasicMaterial({
    color:0x5bbef5,
    side:THREE.BackSide
  });

  const sky = new THREE.Mesh(skyGeo,skyMat);
  sky.position.y = 12;

  scene.add(sky);

  // =====================================================
  // STARS
  // =====================================================

  const starGeo = new THREE.BufferGeometry();
  const starPos = [];

  for(let i=0;i<1000;i++){

    const radius = 45 + Math.random()*8;
    const angle = Math.random()*Math.PI*2;

    starPos.push(
      Math.cos(angle)*radius,
      8 + Math.random()*24,
      Math.sin(angle)*radius
    );
  }

  starGeo.setAttribute(
    'position',
    new THREE.Float32BufferAttribute(starPos,3)
  );

  const stars = new THREE.Points(
    starGeo,
    new THREE.PointsMaterial({
      color:0xffffff,
      size:.18,
      transparent:true,
      opacity:.8
    })
  );

  // stars hidden for daytime

  // =====================================================
  // FIELD
  // =====================================================

  const field = new THREE.Mesh(
    new THREE.PlaneGeometry(70,70),
    new THREE.MeshLambertMaterial({
      color:0x2e8b3c
    })
  );

  field.rotation.x = -Math.PI/2;
  field.receiveShadow = true;
  scene.add(field);

  // mowing stripes — wide bands running left-to-right,
  // seamlessly tiled from home plate out to deep center field

  const stripeColors = [0x2b7a36, 0x1f5f2a];
  const bandDepth = 8;
  const bandStart = 10;   // just in front of home plate
  const bandCount = 8;    // covers to z = -54 (deep outfield)

  for(let k = 0; k < bandCount; k++){
    const stripe = new THREE.Mesh(
      new THREE.PlaneGeometry(70, bandDepth),
      new THREE.MeshLambertMaterial({
        color: stripeColors[k % 2]
      })
    );
    stripe.rotation.x = -Math.PI / 2;
    stripe.position.set(0, 0.01, bandStart - k * bandDepth);
    scene.add(stripe);
  }

  // warning track

  const warningTrack = new THREE.Mesh(
    new THREE.RingGeometry(
      23,
      29,
      64,
      1,
      Math.PI,
      Math.PI
    ),
    new THREE.MeshLambertMaterial({
      color:0x7d4d2a
    })
  );

  warningTrack.rotation.x = -Math.PI/2;
  warningTrack.position.z = -4;
  warningTrack.position.y = .02;

  scene.add(warningTrack);

  // infield dirt — full circle around all bases

  const infield = new THREE.Mesh(
    new THREE.CircleGeometry(17, 64),
    new THREE.MeshLambertMaterial({
      color:0x9a6338
    })
  );

  infield.rotation.x = -Math.PI/2;
  infield.position.set(0, 0.02, -0.5);

  scene.add(infield);

  // inner diamond grass (grass keyhole inside the four bases)
  // ShapeGeometry is in XY plane; after rotation.x=-PI/2:
  //   shape (sx, sy) → world (sx, 0, -sy)
  // Base world positions → shape coords:
  //   Home  (0,  6)   → (0,   -5.3)  inset
  //   First (6.5,-0.5)→ (5.8,  0.4)  inset
  //   2nd   (0,  -7)  → (0,    6.5)  inset
  //   Third (-6.5,-0.5)→(-5.8,  0.4) inset

  const igShape = new THREE.Shape();
  // Straight edges with small concave (inward) arcs only at each base corner.
  // Control points pulled ~1.8 units toward field center (0, 0.7).

  igShape.moveTo( 1.284, -6.689);          // just past home, heading to 1st
  igShape.lineTo( 7.416, -0.662);          // approach 1st base corner
  igShape.quadraticCurveTo( 6.0,  0.75,  7.460,  1.904);  // inward notch at 1st
  igShape.lineTo( 1.241,  8.447);          // approach 2nd base corner
  igShape.quadraticCurveTo( 0.0,  7.05, -1.241,  8.447);  // inward notch at 2nd
  igShape.lineTo(-7.460,  1.904);          // approach 3rd base corner
  igShape.quadraticCurveTo(-6.0,  0.75, -7.416, -0.662);  // inward notch at 3rd
  igShape.lineTo(-1.284, -6.689);          // approach home corner
  igShape.quadraticCurveTo( 0.0, -5.25,  1.284, -6.689);  // inward notch at home
  igShape.closePath();

  const innerGrass = new THREE.Mesh(
    new THREE.ShapeGeometry(igShape),
    new THREE.MeshLambertMaterial({
      color:0x1f5f2a
    })
  );

  innerGrass.rotation.x = -Math.PI/2;
  innerGrass.position.y = 0.045;

  scene.add(innerGrass);

  // home plate area dirt circle

  const homeDirt = new THREE.Mesh(
    new THREE.CircleGeometry(5.5,32),
    new THREE.MeshLambertMaterial({
      color:0x9a6338
    })
  );

  homeDirt.rotation.x = -Math.PI/2;
  homeDirt.position.set(0,.031,9);

  scene.add(homeDirt);

  // mound

  const mound = new THREE.Mesh(
    new THREE.CylinderGeometry(
      2.25,
      2.85,
      .35,
      32
    ),
    new THREE.MeshLambertMaterial({
      color:0xb07a48
    })
  );

  mound.position.set(0,.16,-2);
  mound.castShadow = true;
  mound.userData = { label: 'Post High School', url: 'post-hs.html' };

  scene.add(mound);

  // pitcher's rubber

  const rubber = new THREE.Mesh(
    new THREE.BoxGeometry(.82,.06,.27),
    new THREE.MeshLambertMaterial({
      color:0xfafafa,
      emissive:0xffffff,
      emissiveIntensity:.25
    })
  );

  rubber.position.set(0,.335,-2);
  rubber.castShadow = true;

  scene.add(rubber);

  // =====================================================
  // BASES
  // =====================================================

  const H_=[0,9];
  const F_=[10.1,-0.4];
  const S_=[0,-10.5];
  const T_=[-10.1,-0.4];

  // dirt baselines removed — dirt diamond covers the baseline area

  // foul lines

  // Foul lines: originate at home plate, pass through 1st/3rd base corners, extend to outfield

  let hitBallRAF = null;
  function launchHitBall(hitType) {
    // Target destinations per hit type
    const targets = {
      'SINGLE':   { x: 14,  y: 0.5,  z: -10 },   // shallow right field (fair)
      'DOUBLE':   { x: 10,  y: 0.5,  z: -22 },   // right-center gap (fair)
      'TRIPLE':   { x: 25,  y: 0.5,  z: -15 },   // deep right field, just inside foul line (fair)
      'HOME RUN': { x: 0,   y: 28,   z: -35 },   // high arc into center stands (fair)
    };
    const target = targets[hitType];
    if (!target) return;

    const start = { x: H_[0], y: 1.5, z: H_[1] };
    hitBall.position.set(start.x, start.y, start.z);
    hitBall.visible = true;

    const duration = hitType === 'HOME RUN' ? 2200 : 1400;
    const startTime = performance.now();
    const peakY = hitType === 'HOME RUN' ? 32 : hitType === 'TRIPLE' ? 10 : 7;

    if (hitBallRAF) cancelAnimationFrame(hitBallRAF);

    function animateHitBall(now) {
      const t = Math.min((now - startTime) / duration, 1);

      hitBall.position.x = start.x + (target.x - start.x) * t;
      hitBall.position.z = start.z + (target.z - start.z) * t;
      // Parabolic arc
      hitBall.position.y = start.y + (target.y - start.y) * t + peakY * Math.sin(Math.PI * t);

      if (t < 1) {
        hitBallRAF = requestAnimationFrame(animateHitBall);
      } else {
        // Ball landed — roll away from batter (home plate) and decelerate to a stop
        hitBall.position.y = 0.22;
        const rollStart = performance.now();
        const rollDuration = 1400;
        const landX = target.x, landZ = target.z;
        // Direction away from home plate, normalised
        const dx = target.x - start.x;
        const dz = target.z - start.z;
        const len = Math.sqrt(dx*dx + dz*dz) || 1;
        const rollDist = 5.5; // units to roll after landing
        const rollDX = (dx / len) * rollDist;
        const rollDZ = (dz / len) * rollDist;
        function rollBall(now2) {
          const rt = Math.min((now2 - rollStart) / rollDuration, 1);
          const progress = 1 - (1 - rt) * (1 - rt); // ease-out: starts fast, slows to stop
          hitBall.position.x = landX + rollDX * progress;
          hitBall.position.z = landZ + rollDZ * progress;
          hitBall.position.y = 0.22;
          if (rt < 1) hitBallRAF = requestAnimationFrame(rollBall);
        }
        hitBallRAF = requestAnimationFrame(rollBall);
      }
    }
    hitBallRAF = requestAnimationFrame(animateHitBall);
  }

  const totalFlex = 10+12+10+8+8+8+10+12+10;
  const zoneEdges = [0];
  [10,12,10,8,8,8,10,12,10].forEach(w => zoneEdges.push(zoneEdges[zoneEdges.length-1] + w/totalFlex));
  const zoneHits   = ['FOUL','SINGLE','DOUBLE','TRIPLE','HOME RUN','TRIPLE','DOUBLE','SINGLE','FOUL'];
  const zoneAdv    = [0,1,2,3,4,3,2,1,0];
  const zoneColors = ['#8a2020','#2a7a2a','#1a5090','#6030a0','#C8972B','#6030a0','#1a5090','#2a7a2a','#8a2020'];

  function getZone(pos){
    for(let i = 0; i < zoneEdges.length-1; i++){
      if(pos >= zoneEdges[i] && pos < zoneEdges[i+1]) return i;
    }
    return zoneEdges.length - 2;
  }

  function animateCursor(ts){
    if(!swingStartTime) swingStartTime = ts;
    const dt = Math.min((ts - swingStartTime) / 1000, 0.1);
    swingStartTime = ts;
    swingPos += swingDir * swingSpeed * dt;
    if(swingPos >= 1){ swingPos = 1; swingDir = -1; }
    if(swingPos <= 0){ swingPos = 0; swingDir =  1; }
    swingCursor.style.left = (swingPos * 100) + '%';
    swingCursor.style.background = zoneColors[getZone(swingPos)];
    swingRAF = requestAnimationFrame(animateCursor);
  }

  function startSwingMeter(){

  function advanceBases(count){

    hideBaseModal();
    destSeg = currentBase; // run one more segment
    ballSeg = currentBase;
    ballT   = 0;
    paused  = false;
  });

  // Go back to home plate
  baseGoHomeBtn.addEventListener('click', () => {
    hideBaseModal();
    // run backwards: teleport to home and wait (simplest/cleanest UX)
    currentBase = 0;
    ballSeg     = 0;
    ballT       = 0;
    paused      = true;
    showSwingPanel();
  });

  function getBallPos(seg,t){

    const a=path[seg];
    const b=path[(seg+1)%path.length];

    return new THREE.Vector3(
      a[0]+(b[0]-a[0])*t,
      1.2,
      a[1]+(b[1]-a[1])*t
    );
  }

  // =====================================================
  // PARALLAX
  // =====================================================

  let targetRX=0;
  let targetRY=0;

  let currentRX=0;
  let currentRY=0;

  // Raycaster for base hover + click
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const tooltip = document.getElementById('base-tooltip');
  const tipName = tooltip.querySelector('.tip-name');

  wrap.addEventListener('mousemove',(e)=>{

    const rect = wrap.getBoundingClientRect();

    targetRY=((e.clientX-rect.left)/rect.width-.5)*.4;
    targetRX=-((e.clientY-rect.top)/rect.height-.5)*.16;

    mouse.x = ((e.clientX-rect.left)/rect.width)*2 - 1;
    mouse.y = -((e.clientY-rect.top)/rect.height)*2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(clickMeshes);
    if(hits.length){
      tipName.textContent = hits[0].object.userData.label;
      tooltip.style.opacity = '1';
      tooltip.style.left = (e.clientX - rect.left + 18) + 'px';
      tooltip.style.top  = (e.clientY - rect.top  - 14) + 'px';
      wrap.style.cursor = 'pointer';
    } else {
      tooltip.style.opacity = '0';
      wrap.style.cursor = 'default';
    }
  });

  wrap.addEventListener('click',(e)=>{
    const rect = wrap.getBoundingClientRect();
    mouse.x = ((e.clientX-rect.left)/rect.width)*2 - 1;
    mouse.y = -((e.clientY-rect.top)/rect.height)*2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(clickMeshes);
    if(hits.length){
      const url = hits[0].object.userData.url;
      if(url) window.location.href = url;
    }
  });

  // =====================================================
  // LOOP
  // =====================================================

  const clock = new THREE.Clock();

  function tick(){

    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    currentRX += (targetRX-currentRX)*.04;
    currentRY += (targetRY-currentRY)*.04;

    camera.position.x = currentRY*8;
    camera.position.y = 10 + currentRX*6;

    camera.lookAt(
      currentRY*2,
      1,
      -8
    );

    // ball movement

    if(!paused){
      ballT += delta*.28;

      if(ballT>=1){
        if(ballSeg < destSeg){
          // pass through this base — keep running
          ballT  = 0;
          ballSeg++;
        } else {
          // arrived at destination
          ballT = 1;
          paused = true;
          currentBase = (ballSeg + 1) % 4;
          showBaseModal(ballSeg);
        }
      }
    }

    const bp = getBallPos(ballSeg,ballT);

    // When waiting at home plate, stand in the left batter's box
    if(paused && currentBase === 0){
      bp.x = -2.6;
      bp.z = 9;
    }

    ball.position.copy(bp);
    ballLight.position.copy(bp);

    // glow pulse

    glowRings.forEach((g,i)=>{

      const p=.5+.5*Math.sin(elapsed*2.2+i*1.5);

      g.material.opacity=p*.4;
      g.scale.setScalar(.9+p*.25);
    });

    goldLight.intensity =
      6.0 + Math.sin(elapsed*3)*.6;

    renderer.render(scene,camera);

    requestAnimationFrame(tick);
  }

  // Show swing panel immediately — player starts at home waiting to hit
  showSwingPanel();

  tick();

})();
</script>

</body>
</html>
