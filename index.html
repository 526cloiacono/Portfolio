<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seton Hall Baseball Stadium</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#0d1a2e;
  font-family:Arial,Helvetica,sans-serif;
}

#hero-field-wrap{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

canvas{
  display:block;
}

.overlay{
  position:absolute;
  inset:0;
  z-index:5;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  pointer-events:none;
  text-align:center;
}

.overlay h1{
  font-size:clamp(4rem,10vw,9rem);
  line-height:.9;
  letter-spacing:.08em;
  color:#fff;
  text-shadow:0 0 25px rgba(255,255,255,.25);
}

.overlay h1 span{
  color:#C8972B;
}

.overlay p{
  margin-top:18px;
  color:#d8d8d8;
  letter-spacing:.25em;
  font-size:1rem;
}

/* Base arrival modal */
#base-modal-overlay{
  position:fixed;
  inset:0;
  z-index:50;
  background:rgba(0,0,0,.72);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .35s;
}
#base-modal-overlay.visible{
  opacity:1;
  pointer-events:all;
}
#base-modal{
  background:linear-gradient(160deg,#00205B 0%,#0a1535 100%);
  border:2px solid #C8972B;
  border-radius:12px;
  padding:36px 44px;
  text-align:center;
  max-width:380px;
  width:90%;
  box-shadow:0 0 60px rgba(200,151,43,.35);
  transform:translateY(24px);
  transition:transform .35s;
}
#base-modal-overlay.visible #base-modal{
  transform:translateY(0);
}
#base-modal .modal-base-label{
  color:#C8972B;
  font-size:.75rem;
  letter-spacing:.25em;
  text-transform:uppercase;
  margin-bottom:6px;
}
#base-modal h2{
  color:#fff;
  font-size:1.75rem;
  letter-spacing:.06em;
  margin-bottom:10px;
}
#base-modal p{
  color:#b0bdd8;
  font-size:.9rem;
  letter-spacing:.1em;
  margin-bottom:28px;
}
#base-modal-advance{
  display:inline-block;
  background:#C8972B;
  color:#00205B;
  font-weight:700;
  font-size:.85rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:12px 30px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:background .2s,transform .1s;
}
#base-modal-advance:hover{
  background:#e0ab35;
  transform:scale(1.04);
}

/* Run Again button (home plate) */
#home-advance-btn{
  display:inline-block;
  background:#C8972B;
  color:#00205B;
  font-weight:700;
  font-size:.85rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:12px 30px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:background .2s,transform .1s;
  margin-top:8px;
}
#home-advance-btn:hover{ background:#e0ab35; transform:scale(1.04); }

/* ── Swing panel (fixed side widget) ─────────────────── */
#swing-panel{
  position:fixed;
  right:28px;
  top:50%;
  transform:translateY(-50%) translateX(120%);
  z-index:60;
  background:linear-gradient(160deg,#00205B 0%,#0a1535 100%);
  border:2px solid #C8972B;
  border-radius:12px;
  padding:22px 26px;
  width:240px;
  text-align:center;
  box-shadow:0 0 50px rgba(200,151,43,.4);
  transition:transform .4s cubic-bezier(.22,1,.36,1), opacity .4s;
  opacity:0;
  pointer-events:none;
}
#swing-panel.visible{
  transform:translateY(-50%) translateX(0);
  opacity:1;
  pointer-events:all;
}
#swing-panel .sp-label{
  color:#C8972B;
  font-size:.65rem;
  letter-spacing:.25em;
  text-transform:uppercase;
  margin-bottom:12px;
}
#swing-trigger-btn{
  display:inline-block;
  background:#C8972B;
  color:#00205B;
  font-weight:700;
  font-size:.9rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:13px 28px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  transition:background .2s,transform .1s;
}
#swing-trigger-btn:hover{ background:#e0ab35; transform:scale(1.03); }
#swing-meter-wrap{ display:none; margin-top:14px; }
#swing-meter-track{
  position:relative;
  display:flex;
  height:18px;
  border-radius:4px;
  overflow:hidden;
  margin-bottom:8px;
  border:1px solid rgba(200,151,43,.4);
}
.sm-zone{ height:100%; }
.sm-foul   { flex:10; background:#3a1515; }
.sm-single { flex:12; background:#1a3a1a; }
.sm-double { flex:10; background:#1a2e4a; }
.sm-triple { flex:8;  background:#2a1a4a; }
.sm-homer  { flex:8;  background:#5a3800; }
#swing-cursor{
  position:absolute;
  top:0; bottom:0;
  width:3px;
  background:#fff;
  box-shadow:0 0 8px #fff;
  border-radius:2px;
  left:0;
}
#swing-zone-label{
  font-size:.6rem;
  letter-spacing:.15em;
  color:#7a8fb0;
  margin-bottom:8px;
}
#swing-result-badge{
  font-size:1.5rem;
  font-weight:700;
  letter-spacing:.08em;
  min-height:2rem;
  margin-bottom:8px;
  color:#C8972B;
  text-shadow:0 0 18px rgba(200,151,43,.7);
}
#swing-stop-btn{
  display:none;
  background:#fff;
  color:#00205B;
  font-weight:700;
  font-size:.85rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:11px 0;
  border:none;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  transition:background .2s;
}
#swing-stop-btn:hover{ background:#e0ab35; }

/* Base action buttons (run next / go home) */
#base-actions{
  display:none;
  margin-bottom:6px;
}
#base-run-next-btn, #base-go-home-btn{
  display:block;
  width:100%;
  font-weight:700;
  font-size:.85rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:12px 0;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:background .2s,transform .1s;
}
#base-run-next-btn{
  background:#C8972B;
  color:#00205B;
  margin-bottom:10px;
}
#base-run-next-btn:hover{ background:#e0ab35; transform:scale(1.03); }
#base-go-home-btn{
  background:transparent;
  color:#C8972B;
  border:2px solid #C8972B;
}
#base-go-home-btn:hover{ background:rgba(200,151,43,.12); }
#base-modal-view{
  display:block;
  margin-top:14px;
  color:#C8972B;
  font-size:.8rem;
  letter-spacing:.15em;
  text-transform:uppercase;
  text-decoration:underline;
  opacity:.8;
  transition:opacity .2s, letter-spacing .2s, color .2s;
}
#base-modal-view:hover{
  opacity:1;
  color:#e0ab35;
  letter-spacing:.22em;
}

#base-tooltip{
  position:absolute;
  pointer-events:none;
  z-index:10;
  background:rgba(5,7,13,.9);
  color:#fff;
  padding:10px 18px;
  border-radius:6px;
  font-size:.78rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  border:1px solid rgba(200,151,43,.7);
  opacity:0;
  transition:opacity .2s;
  text-align:center;
  line-height:1.6;
}
#base-tooltip .tip-label{
  color:#C8972B;
  font-size:.7rem;
  display:block;
  margin-top:2px;
}
</style>
</head>

<body>

<div id="base-modal-overlay">
  <div id="base-modal">
    <div class="modal-base-label" id="modal-base-label">First Base</div>
    <h2 id="modal-title">Sophomore Year</h2>
    <p id="modal-desc">Step up to the plate — use the swing meter to advance!</p>
    <!-- At 1st/2nd/3rd: run forward or retreat home -->
    <div id="base-actions">
      <button id="base-run-next-btn">Run to Next Base</button>
      <button id="base-go-home-btn">Go Back to Home Plate</button>
    </div>
    <!-- After scoring -->
    <div id="home-section" style="display:none">
      <button id="home-advance-btn">Run the Bases Again</button>
    </div>
    <a id="base-modal-view" href="#" target="_blank">View Portfolio Page</a>
  </div>
</div>

<!-- Swing panel — fixed to the right side -->
<div id="swing-panel">
  <div class="sp-label">⚾ Batter Up!</div>
  <button id="swing-trigger-btn">SWING</button>
  <div id="swing-meter-wrap">
    <div id="swing-meter-track">
      <div class="sm-zone sm-foul"></div>
      <div class="sm-zone sm-single"></div>
      <div class="sm-zone sm-double"></div>
      <div class="sm-zone sm-triple"></div>
      <div class="sm-zone sm-homer"></div>
      <div class="sm-zone sm-triple"></div>
      <div class="sm-zone sm-double"></div>
      <div class="sm-zone sm-single"></div>
      <div class="sm-zone sm-foul"></div>
      <div id="swing-cursor"></div>
    </div>
    <div id="swing-zone-label">FOUL · SINGLE · DOUBLE · TRIPLE · HR</div>
    <div id="swing-result-badge"></div>
    <button id="swing-stop-btn">STOP</button>
  </div>
</div>

<div id="hero-field-wrap">
  <div id="base-tooltip"><span class="tip-name"></span><span class="tip-label">click to open</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
(() => {

  // =====================================================
  // SETUP
  // =====================================================

  const wrap = document.getElementById('hero-field-wrap');

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0d1a2e,0.03);

  const camera = new THREE.PerspectiveCamera(
    55,
    window.innerWidth/window.innerHeight,
    0.1,
    300
  );

  camera.position.set(0,10,18);
  camera.lookAt(0,1,-8);

  const renderer = new THREE.WebGLRenderer({
    antialias:true,
    alpha:true
  });

  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  wrap.appendChild(renderer.domElement);

  window.addEventListener('resize',()=>{

    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(
      window.innerWidth,
      window.innerHeight
    );
  });

  // =====================================================
  // LIGHTING
  // =====================================================

  scene.add(new THREE.AmbientLight(0xffffff, 1.4));

  const stadiumLight1 = new THREE.SpotLight(
    0xfff4d6,
    6.0,
    180,
    Math.PI/4,
    .4
  );

  stadiumLight1.position.set(-20,30,10);
  stadiumLight1.castShadow = true;
  scene.add(stadiumLight1);

  const stadiumLight2 = new THREE.SpotLight(
    0xdbeaff,
    5.5,
    180,
    Math.PI/4,
    .4
  );

  stadiumLight2.position.set(20,28,10);
  stadiumLight2.castShadow = true;
  scene.add(stadiumLight2);

  // Extra fill light from center field
  const fillLight = new THREE.DirectionalLight(0xfff8f0, 1.8);
  fillLight.position.set(0, 20, -15);
  scene.add(fillLight);

  const goldLight = new THREE.PointLight(
    0xC8972B,
    5.0,
    40
  );

  goldLight.position.set(0,6,6);
  scene.add(goldLight);

  // =====================================================
  // SKY
  // =====================================================

  const skyGeo = new THREE.CylinderGeometry(
    50,
    50,
    40,
    64,
    1,
    true
  );

  const skyMat = new THREE.MeshBasicMaterial({
    color:0x142338,
    side:THREE.BackSide
  });

  const sky = new THREE.Mesh(skyGeo,skyMat);
  sky.position.y = 12;

  scene.add(sky);

  // =====================================================
  // STARS
  // =====================================================

  const starGeo = new THREE.BufferGeometry();
  const starPos = [];

  for(let i=0;i<1000;i++){

    const radius = 45 + Math.random()*8;
    const angle = Math.random()*Math.PI*2;

    starPos.push(
      Math.cos(angle)*radius,
      8 + Math.random()*24,
      Math.sin(angle)*radius
    );
  }

  starGeo.setAttribute(
    'position',
    new THREE.Float32BufferAttribute(starPos,3)
  );

  const stars = new THREE.Points(
    starGeo,
    new THREE.PointsMaterial({
      color:0xffffff,
      size:.18,
      transparent:true,
      opacity:.8
    })
  );

  scene.add(stars);

  // =====================================================
  // FIELD
  // =====================================================

  const field = new THREE.Mesh(
    new THREE.PlaneGeometry(70,70),
    new THREE.MeshLambertMaterial({
      color:0x1f5f2a
    })
  );

  field.rotation.x = -Math.PI/2;
  field.receiveShadow = true;
  scene.add(field);

  // mowing stripes — wide bands running left-to-right,
  // seamlessly tiled from home plate out to deep center field

  const stripeColors = [0x2b7a36, 0x1f5f2a];
  const bandDepth = 8;
  const bandStart = 10;   // just in front of home plate
  const bandCount = 8;    // covers to z = -54 (deep outfield)

  for(let k = 0; k < bandCount; k++){
    const stripe = new THREE.Mesh(
      new THREE.PlaneGeometry(70, bandDepth),
      new THREE.MeshLambertMaterial({
        color: stripeColors[k % 2]
      })
    );
    stripe.rotation.x = -Math.PI / 2;
    stripe.position.set(0, 0.01, bandStart - k * bandDepth);
    scene.add(stripe);
  }

  // warning track

  const warningTrack = new THREE.Mesh(
    new THREE.RingGeometry(
      23,
      29,
      64,
      1,
      Math.PI,
      Math.PI
    ),
    new THREE.MeshLambertMaterial({
      color:0x7d4d2a
    })
  );

  warningTrack.rotation.x = -Math.PI/2;
  warningTrack.position.z = -4;
  warningTrack.position.y = .02;

  scene.add(warningTrack);

  // infield dirt — large circle covering the whole infield area
  // Diamond center in world: x=0, z=-0.5 (midpoint of all four bases)

  const infield = new THREE.Mesh(
    new THREE.CircleGeometry(12, 64),
    new THREE.MeshLambertMaterial({
      color:0x9a6338
    })
  );

  infield.rotation.x = -Math.PI/2;
  infield.position.set(0, 0.02, -0.5);

  scene.add(infield);

  // inner diamond grass (grass keyhole inside the four bases)
  // ShapeGeometry is in XY plane; after rotation.x=-PI/2:
  //   shape (sx, sy) → world (sx, 0, -sy)
  // Base world positions → shape coords:
  //   Home  (0,  6)   → (0,   -5.3)  inset
  //   First (6.5,-0.5)→ (5.8,  0.4)  inset
  //   2nd   (0,  -7)  → (0,    6.5)  inset
  //   Third (-6.5,-0.5)→(-5.8,  0.4) inset

  const igShape = new THREE.Shape();
  // Straight edges with small concave (inward) arcs only at each base corner.
  // Control points pulled ~1.8 units toward field center (0, 0.7).

  igShape.moveTo( 0.856, -4.459);          // just past home, heading to 1st
  igShape.lineTo( 4.944, -0.441);          // approach 1st base corner
  igShape.quadraticCurveTo( 4.0,  0.50,  4.973,  1.269);  // inward notch at 1st
  igShape.lineTo( 0.827,  5.631);          // approach 2nd base corner
  igShape.quadraticCurveTo( 0.0,  4.70, -0.827,  5.631);  // inward notch at 2nd
  igShape.lineTo(-4.973,  1.269);          // approach 3rd base corner
  igShape.quadraticCurveTo(-4.0,  0.50, -4.944, -0.441);  // inward notch at 3rd
  igShape.lineTo(-0.856, -4.459);          // approach home corner
  igShape.quadraticCurveTo( 0.0, -3.50,  0.856, -4.459);  // inward notch at home
  igShape.closePath();

  const innerGrass = new THREE.Mesh(
    new THREE.ShapeGeometry(igShape),
    new THREE.MeshLambertMaterial({
      color:0x1f5f2a
    })
  );

  innerGrass.rotation.x = -Math.PI/2;
  innerGrass.position.y = 0.045;

  scene.add(innerGrass);

  // home plate area dirt circle

  const homeDirt = new THREE.Mesh(
    new THREE.CircleGeometry(3.8,32),
    new THREE.MeshLambertMaterial({
      color:0x9a6338
    })
  );

  homeDirt.rotation.x = -Math.PI/2;
  homeDirt.position.set(0,.031,6);

  scene.add(homeDirt);

  // mound

  const mound = new THREE.Mesh(
    new THREE.CylinderGeometry(
      1.5,
      1.9,
      .35,
      32
    ),
    new THREE.MeshLambertMaterial({
      color:0xb07a48
    })
  );

  mound.position.set(0,.16,0);
  mound.castShadow = true;
  mound.userData = { label: 'Post High School', url: 'post-hs.html' };

  scene.add(mound);

  // pitcher's rubber

  const rubber = new THREE.Mesh(
    new THREE.BoxGeometry(.55,.06,.18),
    new THREE.MeshLambertMaterial({
      color:0xfafafa,
      emissive:0xffffff,
      emissiveIntensity:.25
    })
  );

  rubber.position.set(0,.335,0);
  rubber.castShadow = true;

  scene.add(rubber);

  // =====================================================
  // BASES
  // =====================================================

  const H_=[0,6];
  const F_=[6.5,-0.5];
  const S_=[0,-7];
  const T_=[-6.5,-0.5];

  // dirt baselines

  [[H_,F_],[F_,S_],[S_,T_],[T_,H_]].forEach(([a,b])=>{

    const dx=b[0]-a[0];
    const dz=b[1]-a[1];

    const len=Math.sqrt(dx*dx+dz*dz);

    const strip=new THREE.Mesh(
      new THREE.PlaneGeometry(.9,len),
      new THREE.MeshLambertMaterial({
        color:0x9a6338
      })
    );

    strip.rotation.x=-Math.PI/2;
    strip.rotation.z=-Math.atan2(dx,dz);

    strip.position.set(
      (a[0]+b[0])/2,
      .04,
      (a[1]+b[1])/2
    );

    scene.add(strip);
  });

  // foul lines

  // Foul lines: originate at home plate, pass through 1st/3rd base corners, extend to outfield
  [[[2.6,4.7],[16,-10]],[[-2.6,4.7],[-16,-10]]].forEach(([a,b])=>{

    const dx=b[0]-a[0];
    const dz=b[1]-a[1];

    const len=Math.sqrt(dx*dx+dz*dz);

    const line=new THREE.Mesh(
      new THREE.PlaneGeometry(.15,len),
      new THREE.MeshBasicMaterial({
        color:0xffffff,
        transparent:true,
        opacity:.95
      })
    );

    line.rotation.x=-Math.PI/2;
    line.rotation.z=Math.atan2(-dx,-dz);

    line.position.set(
      (a[0]+b[0])/2,
      .05,
      (a[1]+b[1])/2
    );

    scene.add(line);
  });

  // home plate

  const homeShape = new THREE.Shape();

  homeShape.moveTo(-.45,.55);
  homeShape.lineTo(.45,.55);
  homeShape.lineTo(.45,-.1);
  homeShape.lineTo(0,-.55);
  homeShape.lineTo(-.45,-.1);
  homeShape.closePath();

  const homePlate = new THREE.Mesh(
    new THREE.ExtrudeGeometry(
      homeShape,
      {
        depth:.08,
        bevelEnabled:false
      }
    ),
    new THREE.MeshLambertMaterial({
      color:0xffffff,
      emissive:0xffffff,
      emissiveIntensity:.4
    })
  );

  homePlate.rotation.x = -Math.PI/2;
  homePlate.position.set(H_[0],.08,H_[1]);
  homePlate.userData = { label: 'Before High School', url: 'before-hs.html' };

  scene.add(homePlate);

  // batter's boxes — white outlines left and right of home plate
  // real dimensions: ~4 ft wide, 6 ft long; scaled to match scene units
  const batterBoxMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.9
  });
  const lineW = 0.08; // line thickness
  const bW = 1.0;     // box half-width
  const bH = 1.3;     // box half-height

  [1, -1].forEach(side => {
    const cx = side * (bW + 0.6); // offset left/right from plate
    const cz = H_[1];

    // top, bottom, left, right edges
    [
      [bW*2+lineW, lineW,  0,        -bH],   // bottom
      [bW*2+lineW, lineW,  0,         bH],   // top
      [lineW,      bH*2,  -bW,        0],    // left
      [lineW,      bH*2,   bW,        0],    // right
    ].forEach(([w, h, ox, oz]) => {
      const seg = new THREE.Mesh(
        new THREE.PlaneGeometry(w, h),
        batterBoxMat
      );
      seg.rotation.x = -Math.PI / 2;
      seg.position.set(cx + ox, 0.06, cz + oz);
      scene.add(seg);
    });
  });



  const firstBase = new THREE.Mesh(
    new THREE.BoxGeometry(1,.14,1),
    new THREE.MeshLambertMaterial({
      color:0xC8972B,
      emissive:0xC8972B,
      emissiveIntensity:.3
    })
  );
  firstBase.position.set(F_[0],.08,F_[1]);
  firstBase.rotation.y = Math.PI / 4;
  firstBase.castShadow = true;
  firstBase.userData = { label: 'Sophomore Year', url: 'sophomore.html' };
  scene.add(firstBase);

  // 2nd base – Junior Year

  const secondBase = new THREE.Mesh(
    new THREE.BoxGeometry(1,.14,1),
    new THREE.MeshLambertMaterial({
      color:0x00205B,
      emissive:0x0030aa,
      emissiveIntensity:.3
    })
  );
  secondBase.position.set(S_[0],.08,S_[1]);
  secondBase.rotation.y = Math.PI / 4;
  secondBase.castShadow = true;
  secondBase.userData = { label: 'Junior Year', url: 'junior.html' };
  scene.add(secondBase);

  // 3rd base – Senior Year

  const thirdBase = new THREE.Mesh(
    new THREE.BoxGeometry(1,.14,1),
    new THREE.MeshLambertMaterial({
      color:0xC8972B,
      emissive:0xC8972B,
      emissiveIntensity:.3
    })
  );
  thirdBase.position.set(T_[0],.08,T_[1]);
  thirdBase.rotation.y = Math.PI / 4;
  thirdBase.castShadow = true;
  thirdBase.userData = { label: 'Senior Year', url: 'senior.html' };
  scene.add(thirdBase);

  const clickMeshes = [homePlate, firstBase, secondBase, thirdBase, mound];

  // glow rings

  const glowRings=[];

  [H_,F_,S_,T_].forEach(pos=>{

    const glow = new THREE.Mesh(
      new THREE.RingGeometry(.9,1.5,32),
      new THREE.MeshBasicMaterial({
        color:0xffffff,
        transparent:true,
        opacity:.22,
        side:THREE.DoubleSide
      })
    );

    glow.rotation.x = -Math.PI/2;
    glow.position.set(pos[0],.03,pos[1]);

    scene.add(glow);
    glowRings.push(glow);
  });

  // =====================================================
  // OUTFIELD WALL — navy/gold panels with white padding rail
  // =====================================================

  const WALL_R = 23, WALL_SEGS = 40, WALL_H = 3.2;
  for(let i = 0; i <= WALL_SEGS; i++){
    const angle = (i / WALL_SEGS) * Math.PI;
    const wx = Math.cos(angle - Math.PI/2) * WALL_R;
    const wz = Math.sin(angle - Math.PI/2) * WALL_R - 3;

    const panel = new THREE.Mesh(
      new THREE.BoxGeometry(1.9, WALL_H, 0.4),
      new THREE.MeshLambertMaterial({
        color: i % 2 === 0 ? 0x00205B : 0xC8972B,
        emissive: i % 2 === 0 ? 0x001030 : 0x5f3400,
        emissiveIntensity: .5
      })
    );
    panel.position.set(wx, WALL_H/2, wz);
    panel.rotation.y = angle;
    panel.castShadow = true;
    scene.add(panel);

    // white padding rail on top
    const rail = new THREE.Mesh(
      new THREE.BoxGeometry(1.9, 0.28, 0.55),
      new THREE.MeshLambertMaterial({ color: 0xf0f0f0 })
    );
    rail.position.set(wx, WALL_H + 0.14, wz);
    rail.rotation.y = angle;
    scene.add(rail);
  }

  // =====================================================
  // STADIUM — visible rows of seats directly behind outfield
  // =====================================================

  // --- BACK WALL: flat concrete retaining wall behind seats ---
  const backWall = new THREE.Mesh(
    new THREE.BoxGeometry(70, 22, 1.2),
    new THREE.MeshLambertMaterial({ color: 0x141e30, emissive: 0x060912, emissiveIntensity: .4 })
  );
  backWall.position.set(0, 11, -28);
  scene.add(backWall);

  // --- SEAT ROWS: 14 stacked rows rising up the back wall ---
  const ROWS      = 14;
  const ROW_H     = 1.35;   // vertical step per row
  const ROW_DEPTH = 0.55;   // how deep each row is (z thickness)
  const ROW_W     = 64;     // how wide each row is

  for(let r = 0; r < ROWS; r++){
    const yPos  = 1.2 + r * ROW_H;
    const zPos  = -24.5 - r * 0.55;   // step back as rows rise
    const col   = r % 2 === 0 ? 0x00205B : 0xC8972B;
    const emCol = r % 2 === 0 ? 0x000e2a : 0x3a1e00;

    // Seat strip
    const seatRow = new THREE.Mesh(
      new THREE.BoxGeometry(ROW_W, 0.22, ROW_DEPTH),
      new THREE.MeshLambertMaterial({ color: col, emissive: emCol, emissiveIntensity: .35 })
    );
    seatRow.position.set(0, yPos, zPos);
    scene.add(seatRow);

    // Concrete riser beneath each row
    const riser = new THREE.Mesh(
      new THREE.BoxGeometry(ROW_W, ROW_H * 0.78, 0.28),
      new THREE.MeshLambertMaterial({ color: 0x1a2540, emissive: 0x070c1a, emissiveIntensity: .3 })
    );
    riser.position.set(0, yPos - ROW_H * 0.4, zPos + 0.25);
    scene.add(riser);

    // Crowd dots in this row
    const crowdColors = [0xC8972B, 0x00205B, 0xffffff, 0xeeeeee, 0xff5555, 0x4499ff];
    const dotsInRow = 55;
    for(let d = 0; d < dotsInRow; d++){
      const dx  = -ROW_W/2 + 1 + (d / (dotsInRow-1)) * (ROW_W - 2) + (Math.random()-0.5)*0.6;
      const dcol = crowdColors[Math.floor(Math.random() * crowdColors.length)];
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.19 + Math.random()*0.07, 6, 6),
        new THREE.MeshLambertMaterial({ color: dcol, emissive: dcol, emissiveIntensity: .4 })
      );
      head.position.set(dx, yPos + 0.42, zPos - 0.1 + Math.random()*0.2);
      scene.add(head);
    }
  }

  // --- SIDE STANDS: angled rows down both foul lines ---
  [[-1, -1], [1, 1]].forEach(([side, _]) => {
    const SIDE_ROWS   = 10;
    const STAND_W     = 26;
    const startX      = side * 20;
    const startZ      = 6;

    for(let r = 0; r < SIDE_ROWS; r++){
      const yPos  = 0.8 + r * 1.2;
      const zPos  = startZ - r * 0.5;
      const xOff  = side * (14 + r * 0.4);
      const col   = r % 2 === 0 ? 0x00205B : 0xC8972B;
      const emCol = r % 2 === 0 ? 0x000e2a : 0x3a1e00;

      const seatRow = new THREE.Mesh(
        new THREE.BoxGeometry(0.22, 0.2, STAND_W),
        new THREE.MeshLambertMaterial({ color: col, emissive: emCol, emissiveIntensity: .35 })
      );
      seatRow.position.set(xOff, yPos, zPos - STAND_W/2 + 10);
      scene.add(seatRow);

      const riser = new THREE.Mesh(
        new THREE.BoxGeometry(0.28, 1.0, STAND_W),
        new THREE.MeshLambertMaterial({ color: 0x1a2540, emissive: 0x070c1a, emissiveIntensity: .3 })
      );
      riser.position.set(xOff - side*0.22, yPos - 0.5, zPos - STAND_W/2 + 10);
      scene.add(riser);

      // Crowd dots
      for(let d = 0; d < 22; d++){
        const dz   = zPos - STAND_W/2 + 1 + (d / 21) * (STAND_W - 2) + (Math.random()-0.5)*0.5;
        const dcol = [0xC8972B,0x00205B,0xffffff,0xeeeeee][Math.floor(Math.random()*4)];
        const head = new THREE.Mesh(
          new THREE.SphereGeometry(0.18 + Math.random()*0.06, 5, 5),
          new THREE.MeshLambertMaterial({ color: dcol, emissive: dcol, emissiveIntensity: .4 })
        );
        head.position.set(xOff + side*0.3, yPos + 0.4, dz);
        scene.add(head);
      }
    }
  });



  // =====================================================
  // SCOREBOARD — center field, on pillars with glowing screen
  // =====================================================

  // Support pillars
  [-4, 4].forEach(px => {
    const pillar = new THREE.Mesh(
      new THREE.CylinderGeometry(0.35, 0.45, 16, 10),
      new THREE.MeshLambertMaterial({ color: 0x2a2a3a, emissive: 0x0a0a18, emissiveIntensity: .3 })
    );
    pillar.position.set(px, 8, -26);
    pillar.castShadow = true;
    scene.add(pillar);
  });

  // Main board frame (gold border)
  const sbFrame = new THREE.Mesh(
    new THREE.BoxGeometry(12, 7.2, 0.7),
    new THREE.MeshLambertMaterial({ color: 0xC8972B, emissive: 0x5a3500, emissiveIntensity: .55 })
  );
  sbFrame.position.set(0, 18, -25.5);
  sbFrame.castShadow = true;
  scene.add(sbFrame);

  // Dark board backing
  const sbBack = new THREE.Mesh(
    new THREE.BoxGeometry(11.0, 6.2, 0.5),
    new THREE.MeshLambertMaterial({ color: 0x05080f, emissive: 0x010305, emissiveIntensity: .5 })
  );
  sbBack.position.set(0, 18, -25.2);
  scene.add(sbBack);

  // Glowing LED screen
  const sbScreen = new THREE.Mesh(
    new THREE.PlaneGeometry(9.8, 5.2),
    new THREE.MeshBasicMaterial({ color: 0x0a1f5c })
  );
  sbScreen.position.set(0, 18, -25.0);
  scene.add(sbScreen);

  // Screen content rows (score lines)
  const rowColors = [0xC8972B, 0x1a3acc, 0xC8972B, 0x0a0a50];
  [1.8, 0.6, -0.6, -1.8].forEach((ry, ri) => {
    const rowBar = new THREE.Mesh(
      new THREE.PlaneGeometry(9.0, 0.9),
      new THREE.MeshBasicMaterial({ color: rowColors[ri], transparent: true, opacity: ri % 2 === 0 ? 0.55 : 0.3 })
    );
    rowBar.position.set(0, 18 + ry, -24.95);
    scene.add(rowBar);
  });

  // Scoreboard glow light
  const sbGlow = new THREE.PointLight(0x3355ff, 4.5, 40);
  sbGlow.position.set(0, 18, -23);
  scene.add(sbGlow);

  // "SCOREBOARD" gold top banner strip
  const sbBanner = new THREE.Mesh(
    new THREE.BoxGeometry(12, 0.9, 0.3),
    new THREE.MeshLambertMaterial({ color: 0xC8972B, emissive: 0xC8972B, emissiveIntensity: .8 })
  );
  sbBanner.position.set(0, 22.1, -25.4);
  scene.add(sbBanner);

  // =====================================================
  // LIGHT TOWERS — 4 towers with bright flood lights
  // =====================================================

  function makeLightTower(x, z){
    // Main pole
    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.22, 0.32, 28, 10),
      new THREE.MeshLambertMaterial({ color: 0x778899 })
    );
    pole.position.set(x, 14, z);
    pole.castShadow = true;
    scene.add(pole);

    // Horizontal arm
    const arm = new THREE.Mesh(
      new THREE.BoxGeometry(7, 0.3, 0.3),
      new THREE.MeshLambertMaterial({ color: 0x667788 })
    );
    arm.position.set(x, 27.5, z);
    scene.add(arm);

    // Light fixtures (2 rows × 4 cols)
    for(let row = 0; row < 2; row++){
      for(let col = 0; col < 4; col++){
        const lamp = new THREE.Mesh(
          new THREE.BoxGeometry(1.1, 0.55, 0.6),
          new THREE.MeshLambertMaterial({ color: 0xfff8c8, emissive: 0xfff8c8, emissiveIntensity: 2.0 })
        );
        lamp.position.set(x + (col - 1.5) * 1.6, 28.2 + row * 0.7, z + 0.4);
        scene.add(lamp);
      }
    }

    // Actual spotlight
    const fl = new THREE.SpotLight(0xfff9e8, 5.0, 120, Math.PI/6, 0.4);
    fl.position.set(x, 28, z);
    fl.target.position.set(0, 0, 0);
    fl.castShadow = true;
    scene.add(fl);
    scene.add(fl.target);
  }

  makeLightTower(-20, -5);
  makeLightTower( 20, -5);
  makeLightTower(-16, -20);
  makeLightTower( 16, -20);

  // =====================================================
  // NIGHT SKY backdrop
  // =====================================================

  const sky2 = new THREE.Mesh(
    new THREE.CylinderGeometry(55, 55, 50, 64, 1, true),
    new THREE.MeshBasicMaterial({ color: 0x020508, side: THREE.BackSide })
  );
  sky2.position.set(0, 14, -3);
  scene.add(sky2);

  // Stars
  const starBuf = new Float32Array(900 * 3);
  for(let i = 0; i < 900; i++){
    const ang = Math.random() * Math.PI * 2;
    const r   = 46 + Math.random() * 8;
    const h   = 18 + Math.random() * 28;
    starBuf[i*3]   = Math.cos(ang) * r;
    starBuf[i*3+1] = h;
    starBuf[i*3+2] = Math.sin(ang) * r - 3;
  }
  const sGeo = new THREE.BufferGeometry();
  sGeo.setAttribute('position', new THREE.BufferAttribute(starBuf, 3));
  scene.add(new THREE.Points(sGeo,
    new THREE.PointsMaterial({ color: 0xffffff, size: 0.16, transparent: true, opacity: 0.8 })
  ));



  // =====================================================
  // ANIMATED PLAYER SPRITE — billboard image moving the bases
  // =====================================================

  const playerTex = new THREE.TextureLoader().load('player.png');
  playerTex.colorSpace = THREE.SRGBColorSpace;

  const ball = new THREE.Sprite(
    new THREE.SpriteMaterial({
      map: playerTex,
      transparent: true,
      depthWrite: false
    })
  );

  ball.scale.set(1.4, 2.4, 1);
  scene.add(ball);

  const ballLight = new THREE.PointLight(
    0xffffff,
    1.5,
    5
  );

  scene.add(ballLight);

  const path=[H_,F_,S_,T_,H_];

  // Data shown in the modal when the player arrives at each base
  const stopData = [
    { baseLabel: 'First Base',  title: 'Sophomore Year',     desc: 'You\'re on first! Run to the next base or head back home.', url: 'sophomore.html' },
    { baseLabel: 'Second Base', title: 'Junior Year',        desc: 'Halfway there! Keep running or go back to home plate.',      url: 'junior.html'    },
    { baseLabel: 'Third Base',  title: 'Senior Year',        desc: 'So close to home! Push forward or retreat.',                 url: 'senior.html'    },
    { baseLabel: 'Home Plate',  title: 'Before High School', desc: 'You scored! Ready to run the bases again?',                  url: 'before-hs.html' },
  ];

  let ballT=0;
  let ballSeg=0;
  let paused=true;   // start paused at home waiting for first swing
  let currentBase=0; // 0=home,1=first,2=second,3=third
  let destSeg=0;     // segment index runner is heading to

  const modalOverlay   = document.getElementById('base-modal-overlay');
  const modalLabel     = document.getElementById('modal-base-label');
  const modalTitle     = document.getElementById('modal-title');
  const modalDesc      = document.getElementById('modal-desc');
  const modalView      = document.getElementById('base-modal-view');
  const homeSection    = document.getElementById('home-section');
  const homeAdvanceBtn = document.getElementById('home-advance-btn');
  const baseActions    = document.getElementById('base-actions');
  const baseRunNextBtn = document.getElementById('base-run-next-btn');
  const baseGoHomeBtn  = document.getElementById('base-go-home-btn');

  // Swing panel elements
  const swingPanel      = document.getElementById('swing-panel');
  const swingTriggerBtn = document.getElementById('swing-trigger-btn');
  const swingMeterWrap  = document.getElementById('swing-meter-wrap');
  const swingCursor     = document.getElementById('swing-cursor');
  const swingResult     = document.getElementById('swing-result-badge');
  const swingStopBtn    = document.getElementById('swing-stop-btn');

  // Swing meter state
  let swingRAF = null;
  let swingPos = 0;
  let swingDir = 1;
  let swingSpeed = 0.65;
  let swingRunning = false;
  let swingStartTime = null;

  const totalFlex = 10+12+10+8+8+8+10+12+10;
  const zoneEdges = [0];
  [10,12,10,8,8,8,10,12,10].forEach(w => zoneEdges.push(zoneEdges[zoneEdges.length-1] + w/totalFlex));
  const zoneHits   = ['FOUL','SINGLE','DOUBLE','TRIPLE','HOME RUN','TRIPLE','DOUBLE','SINGLE','FOUL'];
  const zoneAdv    = [0,1,2,3,4,3,2,1,0];
  const zoneColors = ['#8a2020','#2a7a2a','#1a5090','#6030a0','#C8972B','#6030a0','#1a5090','#2a7a2a','#8a2020'];

  function getZone(pos){
    for(let i = 0; i < zoneEdges.length-1; i++){
      if(pos >= zoneEdges[i] && pos < zoneEdges[i+1]) return i;
    }
    return zoneEdges.length - 2;
  }

  function animateCursor(ts){
    if(!swingStartTime) swingStartTime = ts;
    const dt = Math.min((ts - swingStartTime) / 1000, 0.1);
    swingStartTime = ts;
    swingPos += swingDir * swingSpeed * dt;
    if(swingPos >= 1){ swingPos = 1; swingDir = -1; }
    if(swingPos <= 0){ swingPos = 0; swingDir =  1; }
    swingCursor.style.left = (swingPos * 100) + '%';
    swingCursor.style.background = zoneColors[getZone(swingPos)];
    swingRAF = requestAnimationFrame(animateCursor);
  }

  function startSwingMeter(){
    swingRunning     = true;
    swingPos         = 0;
    swingDir         = 1;
    swingStartTime   = null;
    swingResult.textContent = '';
    swingMeterWrap.style.display = 'block';
    swingTriggerBtn.style.display = 'none';
    swingStopBtn.style.display = 'block';
    if(swingRAF) cancelAnimationFrame(swingRAF);
    swingRAF = requestAnimationFrame(animateCursor);
  }

  function stopSwingMeter(){
    swingRunning = false;
    if(swingRAF){ cancelAnimationFrame(swingRAF); swingRAF = null; }
  }

  function resetSwingPanel(){
    stopSwingMeter();
    swingMeterWrap.style.display = 'none';
    swingTriggerBtn.style.display = 'block';
    swingTriggerBtn.textContent = 'SWING';
    swingStopBtn.style.display = 'none';
    swingResult.textContent = '';
  }

  function showSwingPanel(){ swingPanel.classList.add('visible'); }
  function hideSwingPanel(){ swingPanel.classList.remove('visible'); resetSwingPanel(); }

  swingTriggerBtn.addEventListener('click', () => { startSwingMeter(); });

  swingStopBtn.addEventListener('click', () => {
    if(!swingRunning) return;
    stopSwingMeter();
    swingStopBtn.style.display = 'none';
    const zone = getZone(swingPos);
    const hit  = zoneHits[zone];
    const adv  = zoneAdv[zone];
    swingResult.textContent = hit;
    swingResult.style.color = zoneColors[zone];

    if(hit === 'FOUL'){
      setTimeout(() => {
        swingResult.textContent = '';
        swingMeterWrap.style.display = 'none';
        swingTriggerBtn.textContent = 'SWING AGAIN';
        swingTriggerBtn.style.display = 'block';
      }, 1000);
    } else {
      setTimeout(() => {
        hideSwingPanel();
        hideBaseModal();
        advanceBases(adv);
      }, hit === 'HOME RUN' ? 1400 : 900);
    }
  });

  function advanceBases(count){
    // count = bases earned (1=single,2=double,3=triple,4=homer)
    destSeg = Math.min(currentBase + count - 1, 3);
    ballSeg = currentBase;
    ballT   = 0;
    paused  = false;
  }

  function showBaseModal(seg){
    const d = stopData[seg];
    modalLabel.textContent = d.baseLabel;
    modalTitle.textContent = d.title;
    modalDesc.textContent  = d.desc;
    modalView.href = d.url;
    const atHome = seg === stopData.length - 1;
    homeSection.style.display  = atHome  ? 'block' : 'none';
    baseActions.style.display  = !atHome ? 'block' : 'none';
    // Update "Run to Next Base" label: at 3rd it says "Run Home"
    baseRunNextBtn.textContent = seg === 2 ? 'Run Home!' : 'Run to Next Base';
    modalOverlay.classList.add('visible');
    if(atHome) showSwingPanel();
  }

  function hideBaseModal(){
    modalOverlay.classList.remove('visible');
  }

  homeAdvanceBtn.addEventListener('click', () => {
    hideBaseModal();
    currentBase = 0;
    ballSeg     = 0;
    ballT       = 0;
    paused      = true;
    showSwingPanel();
  });

  // Run to next base (from 1st/2nd/3rd)
  baseRunNextBtn.addEventListener('click', () => {
    hideBaseModal();
    destSeg = currentBase; // run one more segment
    ballSeg = currentBase;
    ballT   = 0;
    paused  = false;
  });

  // Go back to home plate
  baseGoHomeBtn.addEventListener('click', () => {
    hideBaseModal();
    // run backwards: teleport to home and wait (simplest/cleanest UX)
    currentBase = 0;
    ballSeg     = 0;
    ballT       = 0;
    paused      = true;
    showSwingPanel();
  });

  function getBallPos(seg,t){

    const a=path[seg];
    const b=path[(seg+1)%path.length];

    return new THREE.Vector3(
      a[0]+(b[0]-a[0])*t,
      1.2,
      a[1]+(b[1]-a[1])*t
    );
  }

  // =====================================================
  // PARALLAX
  // =====================================================

  let targetRX=0;
  let targetRY=0;

  let currentRX=0;
  let currentRY=0;

  // Raycaster for base hover + click
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const tooltip = document.getElementById('base-tooltip');
  const tipName = tooltip.querySelector('.tip-name');

  wrap.addEventListener('mousemove',(e)=>{

    const rect = wrap.getBoundingClientRect();

    targetRY=((e.clientX-rect.left)/rect.width-.5)*.4;
    targetRX=-((e.clientY-rect.top)/rect.height-.5)*.16;

    mouse.x = ((e.clientX-rect.left)/rect.width)*2 - 1;
    mouse.y = -((e.clientY-rect.top)/rect.height)*2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(clickMeshes);
    if(hits.length){
      tipName.textContent = hits[0].object.userData.label;
      tooltip.style.opacity = '1';
      tooltip.style.left = (e.clientX - rect.left + 18) + 'px';
      tooltip.style.top  = (e.clientY - rect.top  - 14) + 'px';
      wrap.style.cursor = 'pointer';
    } else {
      tooltip.style.opacity = '0';
      wrap.style.cursor = 'default';
    }
  });

  wrap.addEventListener('click',(e)=>{
    const rect = wrap.getBoundingClientRect();
    mouse.x = ((e.clientX-rect.left)/rect.width)*2 - 1;
    mouse.y = -((e.clientY-rect.top)/rect.height)*2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(clickMeshes);
    if(hits.length){
      const url = hits[0].object.userData.url;
      if(url) window.location.href = url;
    }
  });

  // =====================================================
  // LOOP
  // =====================================================

  const clock = new THREE.Clock();

  function tick(){

    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    currentRX += (targetRX-currentRX)*.04;
    currentRY += (targetRY-currentRY)*.04;

    camera.position.x = currentRY*8;
    camera.position.y = 10 + currentRX*6;

    camera.lookAt(
      currentRY*2,
      1,
      -8
    );

    // ball movement

    if(!paused){
      ballT += delta*.28;

      if(ballT>=1){
        if(ballSeg < destSeg){
          // pass through this base — keep running
          ballT  = 0;
          ballSeg++;
        } else {
          // arrived at destination
          ballT = 1;
          paused = true;
          currentBase = (ballSeg + 1) % 4;
          showBaseModal(ballSeg);
        }
      }
    }

    const bp = getBallPos(ballSeg,ballT);

    // When waiting at home plate, stand in the right batter's box
    if(paused && currentBase === 0){
      bp.x = -1.6;
    }

    ball.position.copy(bp);
    ballLight.position.copy(bp);

    // glow pulse

    glowRings.forEach((g,i)=>{

      const p=.5+.5*Math.sin(elapsed*2.2+i*1.5);

      g.material.opacity=p*.4;
      g.scale.setScalar(.9+p*.25);
    });

    goldLight.intensity =
      2.3 + Math.sin(elapsed*3)*.4;

    renderer.render(scene,camera);

    requestAnimationFrame(tick);
  }

  // Show swing panel immediately — player starts at home waiting to hit
  showSwingPanel();

  tick();

})();
</script>

</body>
</html>
